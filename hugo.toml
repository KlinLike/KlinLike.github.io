baseURL = "https://KlinLike.github.io/"
languageCode = "zh-CN"
title = "Klin's Notebook 🍉"
theme = "stack"
hasCJKLanguage = true

# 版权信息
copyright = "Klin"

# 分页
[pagination]
  pagerSize = 10

[permalinks]
  post = "/p/:slug/"
  page = "/:slug/"

[params]
  mainSections = ["posts"]
  featuredImageField = "image"
  rssFullContent = true
  
  # 网站描述
  description = "记录我在开发中遇到的问题、想法、解决方案等"
  
  # 页脚配置
  [params.footer]
    since = 2024
    customText = ""

  # 日期格式
  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04"

  # 侧边栏配置
  [params.sidebar]
    emoji = "🍉"
    subtitle = "软件工程师的技术笔记：记录踩坑、提炼方法、持续迭代"
    
    [params.sidebar.avatar]
      enabled = false  # 禁用图片头像，只显示 emoji

  # 文章配置
  [params.article]
    math = false
    toc = true
    readingTime = false
    
    [params.article.license]
      enabled = false

  # 评论（关闭）
  [params.comments]
    enabled = false

  # 代码高亮
  [params.highlight]
    copy = true
    lineNos = true

# 菜单配置
[menu]
  [[menu.main]]
    identifier = "home"
    name = "主页"
    url = "/"
    weight = -100
    [menu.main.params]
      icon = "home"
  
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = -90
    [menu.main.params]
      icon = "user"
  
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = -80
    [menu.main.params]
      icon = "archives"
  
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = -70
    [menu.main.params]
      icon = "search"

# 社交链接
[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/KlinLike"
  [menu.social.params]
    icon = "brand-github"

[[menu.social]]
  identifier = "email"
  name = "Email"
  url = "https://outlook.live.com/mail/0/deeplink/compose?to=mi-cheng@outlook.com"
  [menu.social.params]
    icon = "mail"

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 代码高亮配置
[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true
  
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2

# 分类法
[taxonomies]
  category = "categories"
  tag = "tags"
